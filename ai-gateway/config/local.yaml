telemetry:
  level: "info,ai_gateway=trace"
  exporter: both

server:
  port: 8080

helicone:
  features: none

routers:
  latency:
    load-balance:
      chat:
        strategy: model-latency
        models:
          - openai/gpt-4o-mini
          - anthropic/claude-3-7-sonnet
  my-router:
    load-balance:
      chat:
        strategy: model-latency
        models:
          - bedrock/anthropic.claude-3-7-sonnet-v1:0
          - anthropic/claude-3-7-sonnet