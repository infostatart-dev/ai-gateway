cooldown-defaults:
  # Fallback when upstream returns 429 without Retry-After. NOT the provider RPM/RPD quota.
  provider-error: 15s
  rate-limit: 60s
  quota-exhausted: 1h
  auth-error: 5m
  retry-after-buffer: 1s
  abuse-block: 2h

