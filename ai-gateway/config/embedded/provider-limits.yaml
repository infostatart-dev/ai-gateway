cerebras:
  cooldown:
    provider-error: 20s
    quota-exhausted: 24h
  daily-reset-utc-hour: 0
  observed-at: "2026-06-13"
  scope: api-key
  source: cerebras-inference-docs
  notes:
    - Free tier is 30 RPM, 60k input TPM, 1M tokens/day (resets 00:00 UTC).
    - Requires CEREBRAS_API_KEY.
  tiers:
    free:
      endpoints:
        chat-completions:
          models:
            all:
              limits:
                rpm: 30
                tpm: 60000
                tpd: 1000000

mistral:
  cooldown:
    provider-error: 20s
  observed-at: "2026-06-13"
  scope: api-key
  source: mistral-la-plateforme
  notes:
    - Free Experiment tier includes about 1B tokens/month.
    - Requires MISTRAL_API_KEY.
  tiers:
    free:
      endpoints:
        chat-completions:
          models:
            all:
              limits:
                rpm: 60
                tpm: 500000
                tpd: 33333333

opencode:
  cooldown:
    provider-error: 20s
  observed-at: "2026-06-13"
  scope: api-key
  source: opencode-zen
  notes:
    - Requires OPENCODE_API_KEY (Bearer on https://opencode.ai/zen/v1).
    - Omitted from autodefault when the key is not set.
    - Rate limits are undocumented; values below are conservative estimates.
  tiers:
    free:
      endpoints:
        chat-completions:
          models:
            all:
              limits:
                rpm: 20
                rpd: 200

llm7:
  quota-profile: per-model
  cooldown:
    provider-error: 20s
    quota-exhausted: 24h
  observed-at: "2026-07-04"
  scope: api-key
  source: llm7-docs-models-api
  notes:
    - Requires an LLM7 API token for the configured free-token account.
    - LLM7 docs classify free-token/anonymous models as `turbo`; `pro` models require subscription or balance.
    - Use selectors `default` or `fast` for routing stability; concrete turbo ids can rotate.
  tiers:
    free:
      endpoints:
        chat-completions:
          models:
            all:
              limits:
                rpm: 20
                rpd: 200

