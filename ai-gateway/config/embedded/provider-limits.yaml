openrouter:
  observed-at: "2026-05-02"
  scope: api-key
  source: openrouter-docs
  notes:
    - Credit balance is dynamic and must be read per API key.
    - Negative credit balance can return 402, including for free models.
    - Cloudflare DDoS protection may block unreasonable traffic spikes.
  runtime-sources:
    key-info:
      method: GET
      url: https://openrouter.ai/api/v1/key
      fields:
        limit: Credit limit for the key, null if unlimited.
        limit-reset: Limit reset type, null if never resets.
        limit-remaining: Remaining credits, null if unlimited.
        usage: All-time credits used.
        usage-daily: Current UTC day credits used.
        usage-weekly: Current UTC week credits used.
        usage-monthly: Current UTC month credits used.
        byok-usage: All-time external BYOK credits used.
        is-free-tier: Whether the user has paid for credits before.
      deprecated-fields:
        - rate_limit
  tiers:
    free:
      qualification: is_free_tier=true or less than 10 credits purchased
      rules:
        free-model-variants:
          model-suffix: ":free"
          limits:
            rpm: 20
            rpd: 50
    paid-credits:
      qualification: at least 10 credits purchased
      rules:
        free-model-variants:
          model-suffix: ":free"
          limits:
            rpm: 20
            rpd: 1000

openai:
  observed-at: "2026-05-02"
  scope: organization
  source: openai-docs
  notes:
    - Per-model request and token limits are dynamic by organization and model.
    - Runtime request/token limits should be read from response headers.
    - Unsuccessful requests can still count against per-minute limits.
  runtime-sources:
    response-headers:
      headers:
        limit-requests: x-ratelimit-limit-requests
        limit-tokens: x-ratelimit-limit-tokens
        remaining-requests: x-ratelimit-remaining-requests
        remaining-tokens: x-ratelimit-remaining-tokens
        reset-requests: x-ratelimit-reset-requests
        reset-tokens: x-ratelimit-reset-tokens
    fine-tuning-model-limits:
      method: GET
      url: https://api.openai.com/v1/fine_tuning/model_limits
  tiers:
    free:
      qualification: User must be in an allowed geography.
      limits:
        monthly-usd: 100
    tier-1:
      qualification: $5 paid.
      limits:
        monthly-usd: 100
    tier-2:
      qualification: $50 paid and 7+ days since first successful payment.
      limits:
        monthly-usd: 500
    tier-3:
      qualification: $100 paid and 7+ days since first successful payment.
      limits:
        monthly-usd: 1000
    tier-4:
      qualification: $250 paid and 14+ days since first successful payment.
      limits:
        monthly-usd: 5000
    tier-5:
      qualification: $1000 paid and 30+ days since first successful payment.
      limits:
        monthly-usd: 200000
