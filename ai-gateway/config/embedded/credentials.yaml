# Provider credential slots: one upstream account / billing tier per entry.
# Secrets: env AI_GATEWAY_CREDENTIAL_<ID> (id: gemini-free → AI_GATEWAY_CREDENTIAL_GEMINI_FREE).
# Legacy key-env names still work as fallback. Missing secret → slot skipped.
# budget-rank: lower = tried first in budget-aware routers (within same provider).
credentials:
  openai-default:
    provider: openai
    tier: tier-3
    budget-rank: 0

  anthropic-default:
    provider: anthropic
    tier: tier-3
    budget-rank: 0

  gemini-free:
    provider: gemini
    tier: free
    budget-rank: 0

  gemini-free-2:
    provider: gemini
    tier: free
    budget-rank: 0

  gemini-free-3:
    provider: gemini
    tier: free
    budget-rank: 0

  gemini-free-4:
    provider: gemini
    tier: free
    budget-rank: 0

  gemini-default:
    provider: gemini
    tier: tier-3
    budget-rank: 10

  groq-default:
    provider: groq
    tier: developer
    budget-rank: 0

  openrouter-default:
    provider: openrouter
    tier: free
    budget-rank: 0

  cloudflare-default:
    provider: cloudflare
    tier: free
    budget-rank: 0

  cerebras-default:
    provider: cerebras
    tier: free
    budget-rank: 0

  mistral-default:
    provider: mistral
    tier: free
    budget-rank: 0

  opencode-default:
    provider: opencode
    tier: free
    budget-rank: 0

  # Session file path in AI_GATEWAY_CREDENTIAL_<ID> (not an API key).
  # Fallback env: DEEPSEEK_BROWSER_CLI for deepseek-web-default.
  deepseek-web-default:
    provider: deepseek-web
    tier: free
    budget-rank: 0
