# Local secrets — copy to dev/secrets.local.yaml and fill in real values.
# Discovery: AI_GATEWAY_SECRETS_FILE → ./dev/secrets.local.yaml → ~/.config/ai-gateway/secrets.yaml
#
# Policy (tier, budget-rank, cost-class) lives in embedded credentials.yaml — not here.

credentials:
  openrouter-default:
    api-key: sk-or-...
  gemini-free:
    api-key: ...
  gemini-free-2:
    api-key: ...
  gemini-free-3:
    api-key: ...
  gemini-free-4:
    api-key: ...
  gemini-default:
    api-key: ...
  groq-default:
    api-key: gsk_...
  cloudflare-default:
    api-key: "account_id:cfut_..."
  github-models-default:
    api-key: ghp_...
  deepseek-web-default:
    # Path relative to this secrets file directory (repo root when using dev/secrets.local.yaml)
    session-file: dev/deepseek-session.json
  chatgpt-web-default:
    session-file: dev/session.json

integrations:
  helicone:
    api-key: sk-helicone-...
  aws:
    access-key: ...
    secret-key: ...
    region: eu-central-1
