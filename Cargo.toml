tokio-tungstenite = { version = "0.29.0", features = ["native-tls", "url"] }
tokio-util = "0.7.18"
tower = "0.5.3"
tower_governor = { version = "0.8.0", features = [] }
tower-http = { version = "0.6.8" }
tracing = "0.1.44"
tracing-opentelemetry = "0.32.1"
tracing-subscriber = "0.3.23"
ts-rs = "12.0.1"
typed-builder = "0.23.2"
workspace_root = "0.2.0"
url = "2.5.8"
utoipa = "5.4.0"
uuid = { version = "1.23.1", features = ["serde", "v7"] }
