rusty-s3 = "0.9.1"
serde = { version = "1.0.228", features = ["derive", "rc"] }
serde_json = "1.0.149"
serde_path_to_error = "0.1.20"
serde_with = "3.18.0"
serde_yml = "0.0.12"
serial_test = "3.4.0"
strum = "0.28.0"
stubr = { git = "https://github.com/Helicone/stubr" }
sqlx = { version = "0.8.6" }
thiserror = "2.0.18"
tokio = { version = "1.52.1", features = ['full'] }
tokio-stream = "0.1.18"
