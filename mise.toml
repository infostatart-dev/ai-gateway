[tools]
rust = [
  { version = "1.91.1", profile = "default", components = "clippy, rustfmt, llvm-tools-preview" },
  { version = "nightly", components = "rustfmt" },
]
cmake = "4.3.4"
node = "24"
"npm:@fission-ai/openspec" = "1.4.1"

[env]
# Stable default when nightly is also installed (mise discussion #6254)
RUSTUP_TOOLCHAIN = "1.91.1"

[tasks."predeploy:fmt"]
description = "Check formatting with nightly rustfmt (matches rust-ci.yml)"
tools = { rust = "nightly" }
env = { RUSTUP_TOOLCHAIN = "nightly" }
run = "cargo fmt --all -- --check"

[tasks."predeploy:clippy"]
description = "Clippy with CI settings — incremental compile OK, no release build"
run = "./scripts/cargo-env cargo ci-clippy"

[tasks."predeploy:test-lib"]
description = "Lib unit tests — incremental compile OK"
run = "./scripts/cargo-env cargo test --all-features --lib"

[tasks."test:all"]
description = "Full workspace test suite with auto CPU jobs and warning/failure summary"
run = "./scripts/test-all"

[tasks."coverage:lib"]
description = "Workspace lib unit tests — same scope as CI and coverage:gate"
tools = { "cargo:cargo-llvm-cov" = "latest" }
env = { CARGO_INCREMENTAL = "0" }
run = "cargo llvm-cov --workspace --all-features --lib --summary-only"

[tasks."coverage:report"]
description = "LCOV report for IDE / Codecov (lcov.info at repo root)"
tools = { "cargo:cargo-llvm-cov" = "latest" }
env = { CARGO_INCREMENTAL = "0" }
run = "cargo llvm-cov --workspace --all-features --lib --lcov --output-path lcov.info"

[tasks."coverage:gate"]
description = "Fail if workspace lib line coverage drops below baseline floor (48%)"
tools = { "cargo:cargo-llvm-cov" = "latest" }
env = { CARGO_INCREMENTAL = "0" }
run = "cargo llvm-cov --workspace --all-features --lib --summary-only --fail-under-lines 48"

[tasks."catalog:verify-gemini"]
description = "Assert embedded Gemini catalog slugs exist in ListModels fixture"
run = "./scripts/cargo-env cargo test -p ai-gateway --test verify_gemini_catalog --features testing"

[tasks."catalog:verify-openrouter"]
description = "Assert embedded OpenRouter catalog slugs exist in ListModels fixture"
run = "./scripts/cargo-env cargo test -p ai-gateway --test verify_openrouter_catalog --features testing"

[tasks."release:build"]
description = "Release build with auto CPU jobs and warning summary (CI-equivalent profile)"
alias = "release"
run = "./scripts/release-build"

[tasks."release:local"]
description = "Local CPU-specific release-like build: native CPU + faster thin-LTO/codegen"
env = { AI_GATEWAY_RELEASE_NATIVE = "1", AI_GATEWAY_RELEASE_FAST = "1" }
run = "./scripts/release-build"

[tasks."predeploy:rust"]
description = "Rust diff gate: fmt + clippy + lib tests + catalog verify"
depends = ["predeploy:fmt", "predeploy:clippy", "predeploy:test-lib", "catalog:verify-gemini", "catalog:verify-openrouter"]

[tasks."openspec:validate-changes"]
description = "Validate active OpenSpec changes"
run = "openspec validate --changes"

[tasks."predeploy:tooling"]
description = "Tooling/docs/openspec diff — no cargo"
depends = ["openspec:validate-changes"]

# Default alias kept for rust changes; agent picks rust vs tooling per skill
[tasks.predeploy-check]
description = "Rust pre-deploy (use predeploy:tooling when diff has no *.rs)"
depends = ["predeploy:rust"]
alias = "predeploy"

[tasks."openspec:validate"]
description = "Validate OpenSpec (strict, single item or interactive)"
run = "openspec validate --strict"

[tasks."openspec:list"]
description = "List active OpenSpec changes"
run = "openspec list"

[tasks."dev:emulated"]
description = "Emulated autodefault stack: upstream-emulator :5151 + gateway :8080 (no live keys)"
run = """
#!/usr/bin/env bash
set -euo pipefail
ROOT="$(cd "$(dirname "$0")" && pwd)"
export AI_GATEWAY_SECRETS_FILE="${AI_GATEWAY_SECRETS_FILE:-$ROOT/dev/secrets.emulated.yaml}"
export AI_GATEWAY_EMULATED=1
export AI_GATEWAY_EMULATOR_URL="${AI_GATEWAY_EMULATOR_URL:-http://127.0.0.1:5151}"
cargo run -p upstream-emulator -- --port 5151 &
EMU_PID=$!
trap 'kill $EMU_PID 2>/dev/null || true' EXIT
sleep 1
cargo run -p ai-gateway -- -c ./ai-gateway/config/emulated.yaml
"""
