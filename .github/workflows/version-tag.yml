name: Version tag

# When `[workspace.package].version` in root Cargo.toml changes on `main`:
# 1. Ensure annotated `v{version}` exists at HEAD (create if missing).
# 2. Dispatch `release.yml` and `docker.yml` on that tag ref.
#
# Tag pushes from GITHUB_TOKEN do not trigger other workflows (`push: tags`),
# so semver release/docker are workflow_dispatch-only — never push `v*` tags
# manually from a developer machine (that duplicates jobs and skips dispatch
# when version-tag sees the tag already exists).

on:
  push:
    branches:
      - main
    paths:
      - Cargo.toml
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  tag-and-release:
    name: Tag and dispatch releases
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read workspace version
        id: ver
        run: |
          set -euo pipefail
          version=$(grep -E '^version[[:space:]]*=' Cargo.toml \
            | head -n1 \
            | sed -E 's/^version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
          if [ -z "$version" ]; then
            echo "::error file=Cargo.toml::Could not read [workspace.package].version"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "Workspace version: $version"

      - name: Resolve release tag
        id: tag
        run: |
          set -euo pipefail
          tag="${{ steps.ver.outputs.tag }}"
          head=$(git rev-parse HEAD)

          resolve_tag() {
            local tagged="$1"
            if [ "$tagged" = "$head" ]; then
              echo "created=false" >> "$GITHUB_OUTPUT"
              echo "Tag $tag already at HEAD."
              return 0
            fi
            if git merge-base --is-ancestor "$tagged" "$head"; then
              echo "created=false" >> "$GITHUB_OUTPUT"
              echo "Tag $tag at $tagged is an ancestor of HEAD — reusing for dispatch."
              return 0
            fi
            echo "::error::Tag $tag points to $tagged but is not an ancestor of HEAD ($head)"
            exit 1
          }

          if git rev-parse --verify "refs/tags/$tag" >/dev/null 2>&1; then
            tagged=$(git rev-parse "$tag^{commit}")
            resolve_tag "$tagged"
          else
            remote_sha=$(git ls-remote --tags origin "refs/tags/$tag" \
              | awk '{print $1}' | head -n1 || true)
            if [ -n "$remote_sha" ]; then
              tagged=$(git rev-parse "$remote_sha^{commit}" 2>/dev/null || echo "$remote_sha")
              resolve_tag "$tagged"
            else
              echo "created=true" >> "$GITHUB_OUTPUT"
              echo "Tag $tag is new — will create at HEAD."
            fi
          fi

      - name: Configure git identity
        if: steps.tag.outputs.created == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Create and push annotated tag
        if: steps.tag.outputs.created == 'true'
        run: |
          set -euo pipefail
          tag="${{ steps.ver.outputs.tag }}"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"

      - name: Dispatch versioned binary release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ steps.ver.outputs.tag }}"
          gh workflow run release.yml \
            --repo "${{ github.repository }}" \
            --ref "$tag"
          echo "Dispatched release.yml for $tag."

      - name: Dispatch Docker release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ steps.ver.outputs.tag }}"
          gh workflow run docker.yml \
            --repo "${{ github.repository }}" \
            --ref "$tag"
          echo "Dispatched docker.yml for $tag."
