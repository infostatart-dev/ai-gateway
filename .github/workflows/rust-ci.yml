name: Rust CI

on:
  push:
    branches: ["main"]
    # Skip when the push only updates OpenSpec planning artifacts (no Rust/build inputs).
    # Also allow rust-ci.yml-only tweaks alongside openspec without triggering a build.
    paths-ignore:
      - "openspec/**"
      - ".github/workflows/rust-ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "Cargo.toml"
      - "crates/**"
      - "ai-gateway/config/**"
      - "ai-gateway/src/**"
      - "ai-gateway/stubs/**"
      - "ai-gateway/tests/**"
      - "ai-gateway/Cargo.toml"

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Use nightly rustfmt
        run: rustup component add --toolchain nightly-x86_64-unknown-linux-gnu rustfmt
      - name: Output rustup and cargo version for educational purposes
        run: rustup --version && echo "\n" && cargo --version
      - name: Format
        run: cargo +nightly fmt --check
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2
        with:
          cache-targets: "false"
          shared-key: "deps-rustls-v1"
          # To only cache runs from `main`:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: print rust version for educational purposes
        run: cargo --version
      - name: Clippy
        run: cargo +stable ci-clippy
      - name: Dead code gate (ai-gateway)
        run: RUSTFLAGS="-D dead_code" cargo +stable build -p ai-gateway --lib
  test:
    runs-on: ubuntu-latest
    env:
      HELICONE_API_KEY: "sk-helicone-..."
    services:
      redis:
        image: redis:8.0.2-alpine
        ports:
          - 6340:6379
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2
        with:
          cache-targets: "false"
          shared-key: "deps-rustls-v1"
          # To only cache runs from `main`:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: print rust version for educational purposes
        run: cargo --version
      - name: Test
        run: cargo +stable test --tests --all-features
      - name: Verify embedded provider catalogs
        run: >-
          cargo +stable test -p ai-gateway
          --test verify_gemini_catalog
          --test verify_openrouter_catalog
          --features testing
  coverage:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      CARGO_INCREMENTAL: "0"
    services:
      redis:
        image: redis:8.0.2-alpine
        ports:
          - 6340:6379
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2
        with:
          cache-targets: "false"
          shared-key: "deps-rustls-v1"
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install llvm-tools and cargo-llvm-cov
        run: rustup component add llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Lib coverage summary
        run: cargo llvm-cov --workspace --all-features --lib --summary-only
      - name: LCOV report
        run: cargo llvm-cov --workspace --all-features --lib --lcov --output-path lcov.info
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
          if-no-files-found: error
