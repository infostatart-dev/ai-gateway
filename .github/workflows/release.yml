name: Release binaries

# Semver artifacts are dispatched by version-tag.yml (GITHUB_TOKEN tag pushes
# do not trigger other workflows). Use workflow_dispatch for manual reruns.

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            platform: linux
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libssl-dev \
            cmake \
            clang \
            libclang-dev

      - name: Build
        run: cargo build --release -p ai-gateway

      - name: Install llvm-tools (Windows)
        if: matrix.os == 'windows-latest'
        run: rustup component add llvm-tools-preview

      - name: Strip binary
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            LLVM_STRIP=$(rustc --print sysroot)/lib/rustlib/${{ matrix.target }}/bin/llvm-strip
            if [ -x "$LLVM_STRIP" ]; then
              "$LLVM_STRIP" target/release/ai-gateway.exe || true
            fi
          else
            strip target/release/ai-gateway || true
          fi

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p artifacts
          name="ai-gateway-${{ github.ref_name }}-${{ matrix.platform }}"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/release/ai-gateway.exe "artifacts/${name}.exe"
          else
            cp target/release/ai-gateway "artifacts/${name}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ai-gateway-${{ github.ref_name }}-${{ matrix.platform }}
          path: artifacts/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          make_latest: ${{ !contains(github.ref_name, '-') }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: artifacts/**
