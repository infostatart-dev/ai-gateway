name: Release binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libssl-dev \
            cmake \
            clang \
            libclang-dev

      - name: Build
        run: cargo build --release -p ai-gateway

      - name: Install llvm-tools (Windows)
        if: matrix.os == 'windows-latest'
        run: rustup component add llvm-tools-preview

      - name: Strip binary
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            LLVM_STRIP=$(rustc --print sysroot)/lib/rustlib/${{ matrix.target }}/bin/llvm-strip
            if [ -x "$LLVM_STRIP" ]; then
              "$LLVM_STRIP" target/release/ai-gateway.exe || true
            fi
          else
            strip target/release/ai-gateway || true
          fi

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p artifacts
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/release/ai-gateway.exe "artifacts/ai-gateway-${{ matrix.target }}.exe"
          else
            cp target/release/ai-gateway "artifacts/ai-gateway-${{ matrix.target }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-gateway-${{ matrix.target }}
          path: artifacts/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: artifacts/**
